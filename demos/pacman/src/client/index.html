<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivalis · Pac-Man</title>
</head>
<body>
    <div id="app">
        <form id="login">
            <h1>Rivalis Pac-Man</h1>
            <p>Authoritative server · real-time multiplayer</p>
            <label>
                Name
                <input id="name" autocomplete="off" maxlength="20" placeholder="player" required>
            </label>
            <button type="submit">Join game</button>
            <small>Open this page in two tabs to play together.</small>
        </form>

        <div id="game" hidden>
            <div id="hud">
                <span id="status">connecting…</span>
                <ol id="scores"></ol>
            </div>
            <canvas id="board"></canvas>
            <p id="hint">Move with <kbd>WASD</kbd> or the <kbd>arrow keys</kbd>. Eat pellets, dodge ghosts.</p>
        </div>
    </div>
    <script type="module" src="./index.ts"></script>
</body>
</html>
