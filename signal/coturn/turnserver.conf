# coturn configuration for @rivalis/signal
#
# TURN relay sidecar — static-auth-secret / REST scheme.
# Validates the ephemeral credentials minted by IceConfig.issueFor():
#
#   username   = "<unixExpiry>:<peerId>"
#   credential = base64(HMAC_SHA1(static-auth-secret, username))
#
# coturn verifies the HMAC and rejects creds whose unixExpiry is in the past.
# The shared secret never reaches clients — they receive only the derived pair.
#
# Copy this file to your deploy path and replace every <PLACEHOLDER> before use.
# Required replacements are marked REQUIRED; optional sections are clearly labelled.

# ── Identity ──────────────────────────────────────────────────────────────────

# Realm identifies your TURN service. Use your domain or a stable subdomain.
# Must be non-empty; clients include it in credential computation.
#
# REQUIRED: replace with your domain.
realm=turn.example.com

# ── Authentication (REST / static-auth-secret) ────────────────────────────────

# Enable the REST API credential scheme (HMAC ephemeral creds).
# This is mutually exclusive with lt-cred-mech (username/password database).
use-auth-secret

# The HMAC shared secret. Must exactly match ICE_TURN_SECRET on the signal server.
#
# REQUIRED: replace with a strong random secret (≥ 32 bytes of entropy recommended).
# Generate one with: openssl rand -hex 32
#
# Rotation: see "Secret rotation" section below.
static-auth-secret=REPLACE_WITH_ICE_TURN_SECRET

# Credential TTL hint (seconds). coturn rejects creds whose embedded unixExpiry
# has passed. IceConfig defaults to 86400 s (24 h); set this to match or exceed
# your ICE_TTL so coturn does not reject still-valid creds.
# Default: 86400 (24 h). Adjust if you change ICE_TTL.
#max-allocate-timeout=86400

# ── Ports ─────────────────────────────────────────────────────────────────────

# Plain STUN/TURN — UDP and TCP. Open in your firewall/security group.
listening-port=3478

# TURNS (TURN over TLS) — TCP only. Open in your firewall/security group.
# Comment out if you are not providing TLS (not recommended for production).
tls-listening-port=5349

# TURN relay address range (UDP). coturn allocates from this range for relay.
# The entire range must be reachable by peers. Open in your firewall.
# REQUIRED: replace with an appropriate range for your host.
min-port=49152
max-port=65535

# ── Listen address ────────────────────────────────────────────────────────────

# Bind to all interfaces. For a multi-homed host, specify the public-facing
# IP instead (e.g. listening-ip=203.0.113.10).
#listening-ip=0.0.0.0

# If the server is behind NAT, declare the external (public) IP so coturn
# inserts the correct address in XOR-MAPPED-ADDRESS responses.
# REQUIRED when behind NAT: uncomment and set.
#external-ip=<PUBLIC_IP>

# ── TLS certificates ──────────────────────────────────────────────────────────

# Paths to your TLS certificate and private key (PEM format).
# Required when tls-listening-port is active.
#
# REQUIRED for TURNS: replace paths with your certificate and key locations.
# Obtain a certificate from Let's Encrypt or your CA:
#   certbot certonly --standalone -d turn.example.com
cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem

# Cipher list for TLS. The default is acceptable; restrict further if needed.
#cipher-list=ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# ── Security hardening ────────────────────────────────────────────────────────

# Enable STUN message fingerprint verification.
fingerprint

# Require TURN allocations to be authenticated (default for REST mode, explicit here).
#no-auth=false

# Block loopback and multicast relay addresses so peers cannot relay to internal
# services. Recommended for all deployments.
no-loopback-peers
no-multicast-peers

# Restrict TURN to data channels only (no relay of arbitrary TCP/UDP to the internet).
# Comment out only if you need full-proxy TURN support (uncommon for WebRTC).
#no-tcp-relay

# Rate-limit per allocation (bytes/s). Adjust to prevent relay abuse.
#max-bps=500000

# ── Logging ───────────────────────────────────────────────────────────────────

# Log file. Set to stdout for container deployments.
#log-file=/var/log/coturn/turnserver.log

# Verbose logging for debugging. Disable in production.
#verbose

# ── Process ───────────────────────────────────────────────────────────────────

# PID file. Used by init systems and restart scripts.
pidfile=/var/run/turnserver.pid

# Drop privileges after binding ports.
# REQUIRED: replace with a non-root user and group.
#proc-user=turnserver
#proc-group=turnserver

# ── Secret rotation ───────────────────────────────────────────────────────────
#
# Zero-downtime rotation procedure:
#
# 1. Generate a new secret: openssl rand -hex 32
#
# 2. Update ICE_TURN_SECRET on the signal server to the new secret and restart
#    (or reload) the signal process. From this point new creds are minted with
#    the new secret.
#
# 3. Wait for the old creds to expire. The maximum window is the ICE_TTL you
#    configured (default 24 h). Peers that connected before the rotation will
#    have creds valid for at most ICE_TTL seconds; after that they must
#    reconnect and receive new creds.
#
# 4. Update static-auth-secret in this file to the new secret and restart
#    coturn: systemctl restart coturn  (or send SIGHUP if your version supports it)
#
# No simultaneous restart of both services is needed because:
#   - Old creds (HMAC of old secret) remain valid on coturn until step 4.
#   - New creds (HMAC of new secret) are rejected by coturn until step 4 —
#     so step 4 is the cutover. Keep step 4 within the ICE_TTL window to
#     avoid a period where all existing creds are invalid.
#
# For high-availability deployments (multiple coturn instances behind a
# load balancer), update and restart each instance one at a time. The
# TTL window provides the overlap needed for a rolling restart.
